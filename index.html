<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>A&E Joyería Elegance</title>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#222;
    }

    header{
      background:#111;
      color:white;
      text-align:center;
      padding:30px;
    }

    .logo-big{
      font-size:60px;
      font-weight:bold;
      letter-spacing:5px;
      margin-bottom:10px;
    }

    header h1{
      font-size:32px;
      letter-spacing:2px;
    }

    header p{
      margin-top:10px;
      color:#ccc;
    }

    .hero{
      height:320px;
      background:url('https://images.unsplash.com/photo-1617038220319-276d3cfab638?q=80&w=1400&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
    }

    .hero-box{
      background:rgba(0,0,0,0.65);
      color:white;
      padding:30px;
      border-radius:15px;
    }

    .hero-box h2{
      font-size:40px;
      margin-bottom:10px;
    }

    .container{
      width:92%;
      max-width:1200px;
      margin:auto;
      padding:40px 0;
    }

    /* PANEL ADMIN */

    .admin-panel{
      background:white;
      padding:25px;
      border-radius:15px;
      margin-bottom:40px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      display:none;
    }

    .upload-btn{
      display:inline-block;
      background:#111;
      color:white;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      margin-top:15px;
    }

    input[type=file]{
      display:none;
    }

    /* GALERIA */

    .gallery{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      position:relative;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
      cursor:pointer;
    }

    .card-content{
      padding:15px;
    }

    .card-content h3{
      margin-bottom:10px;
    }

    .status{
      font-weight:bold;
      margin-bottom:10px;
    }

    .whatsapp-btn{
      display:inline-block;
      margin-top:10px;
      background:#111;
      color:white;
      padding:10px 15px;
      text-decoration:none;
      border-radius:8px;
    }

    .delete-btn{
      position:absolute;
      top:10px;
      right:10px;
      width:35px;
      height:35px;
      border:none;
      border-radius:50%;
      background:red;
      color:white;
      font-size:18px;
      cursor:pointer;
      display:none;
    }

    .status-btn{
      margin-top:10px;
      background:#444;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      display:none;
    }

    .qr-box{
      margin-top:25px;
      text-align:center;
    }

    #qrcode{
      display:flex;
      justify-content:center;
      margin-top:15px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:40px;
    }

    /* MODAL */

    .modal{

      display:none;

      position:fixed;

      z-index:9999;

      left:0;

      top:0;

      width:100%;

      height:100%;

      background:rgba(0,0,0,0.95);

      justify-content:center;

      align-items:center;

      padding:20px;

    }

    .modal-content{

      max-width:95%;

      max-height:90vh;

      border-radius:15px;

    }

    .close-modal{

      position:absolute;

      top:20px;

      right:35px;

      color:white;

      font-size:50px;

      cursor:pointer;

    }

    @media(max-width:600px){

      .logo-big{
        font-size:45px;
      }

      .hero-box h2{
        font-size:28px;
      }

    }

  </style>

</head>

<body>

<header>

  <div class="logo-big">
    A&E
  </div>

  <h1>
    JOYERÍA ELEGANCE
  </h1>

  <p>
    Catálogo Exclusivo de Joyas
  </p>

</header>

<section class="hero">

  <div class="hero-box">

    <h2>
      Brilla con Elegancia
    </h2>

    <p>
      Descubre nuestras últimas joyas disponibles
    </p>

  </div>

</section>

<div class="container">

  <!-- PANEL ADMIN -->

  <div
    class="admin-panel"
    id="adminPanel"
  >

    <h2>
      Panel Privado
    </h2>

    <p>
      Solo tú podrás subir imágenes nuevas.
    </p>

    <label class="upload-btn">

      Subir Imágenes

      <input
        type="file"
        id="fileInput"
        multiple
        accept="image/*"
      >

    </label>

    <div class="qr-box">

      <h3>
        QR del Sitio
      </h3>

      <div id="qrcode"></div>

    </div>

  </div>

  <!-- GALERIA -->

  <div
    class="gallery"
    id="gallery"
  ></div>

</div>

<footer>

  WhatsApp:
  +503 7681-7296

  <br><br>

  © 2026 A&E Joyería Elegance

</footer>

<!-- MODAL -->

<div
  id="imageModal"
  class="modal"
>

  <span
    class="close-modal"
    onclick="closeModal()"
  >
    &times;
  </span>

  <img
    class="modal-content"
    id="modalImage"
  >

</div>

<script>

  // ========= SUPABASE =========

  const supabaseUrl =
    "https://dwblvytrbofbhxemyzip.supabase.co";

  const supabaseKey =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3Ymx2eXRyYm9mYmh4ZW15emlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNDEyNTMsImV4cCI6MjA4MDYxNzI1M30.U3QNMrLJlZExhLQZRrmkk29suWBt0G9EpQaaL6OvUaI";

  const supabaseClient =
    supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

  // ========= CONFIG =========

  const adminPassword =
    "A&E2026";

  const websiteURL =
    "https://jovial-lollipop-c8942a.netlify.app";

  const whatsappNumber =
    "50376817296";

  // ========= ELEMENTOS =========

  const gallery =
    document.getElementById("gallery");

  const fileInput =
    document.getElementById("fileInput");

  const adminPanel =
    document.getElementById("adminPanel");

  // ========= LOGIN ADMIN =========

  const urlParams =
    new URLSearchParams(window.location.search);

  const adminMode =
    urlParams.get("admin");

  if(adminMode === "true"){

    const password =
      prompt("Ingrese contraseña");

    if(password === adminPassword){

      adminPanel.style.display =
        "block";

    }

  }

  // ========= CARGAR PRODUCTOS =========

  async function loadProducts(){

    gallery.innerHTML = "";

    const {
      data,
      error
    } = await supabaseClient

      .from("productos")

      .select("*")

      .order("created_at",{

        ascending:false

      });

    if(error){

      console.log(error);

      return;

    }

    data.forEach((product)=>{

      const statusText =
        product.disponible
        ? "DISPONIBLE"
        : "NO DISPONIBLE";

      const statusColor =
        product.disponible
        ? "green"
        : "white";

      const card =
        document.createElement("div");

      card.className = "card";

      card.innerHTML = `

        <img
          src="${product.imagen}"
          onclick="openModal('${product.imagen}')"
        >

        <div class="card-content">

          <h3>
            Joya Exclusiva
          </h3>

          <p
            class="status"
            style="color:${statusColor}"
          >
            ${statusText}
          </p>

          <a
            class="whatsapp-btn"
            target="_blank"
            href="https://wa.me/${whatsappNumber}?text=Hola%20estoy%20interesado%20en%20sus%20productos"
          >

            Consultar por WhatsApp

          </a>

          <br>

          <button
            class="status-btn"
            onclick="toggleStatus(${product.id}, ${product.disponible})"
          >

            Cambiar Estado

          </button>

        </div>

      `;

      // ========= BOTONES ADMIN =========

      if(adminMode === "true"){

        const deleteBtn =
          document.createElement("button");

        deleteBtn.innerHTML = "×";

        deleteBtn.className =
          "delete-btn";

        deleteBtn.style.display =
          "block";

        deleteBtn.onclick =
          ()=>deleteProduct(product.id);

        card.appendChild(deleteBtn);

      }

      gallery.appendChild(card);

    });

    // ========= MOSTRAR BOTONES ADMIN =========

    if(adminMode === "true"){

      document.querySelectorAll(".status-btn")
      .forEach(btn=>{

        btn.style.display =
          "inline-block";

      });

    }

  }

  // ========= SUBIR IMAGEN =========

  fileInput.addEventListener(

    "change",

    async function(e){

      const files =
        e.target.files;

      for(const file of files){

        const fileName =
          Date.now() + "-" + file.name;

        // ========= SUBIR STORAGE =========

        const {

          error:uploadError

        } = await supabaseClient

        .storage

        .from("joyeria")

        .upload(fileName,file);

        if(uploadError){

          console.log(uploadError);

          continue;

        }

        // ========= OBTENER URL =========

        const {

          data:urlData

        } = supabaseClient

        .storage

        .from("joyeria")

        .getPublicUrl(fileName);

        // ========= INSERTAR DB =========

        await supabaseClient

        .from("productos")

        .insert([{

          imagen:
            urlData.publicUrl,

          disponible:true

        }]);

      }

      loadProducts();

    }

  );

  // ========= ELIMINAR =========

  async function deleteProduct(id){

    await supabaseClient

      .from("productos")

      .delete()

      .eq("id",id);

    loadProducts();

  }

  // ========= CAMBIAR ESTADO =========

  async function toggleStatus(
    id,
    currentStatus
  ){

    await supabaseClient

      .from("productos")

      .update({

        disponible:
          !currentStatus

      })

      .eq("id",id);

    loadProducts();

  }

  // ========= MODAL =========

  function openModal(imageSrc){

    document.getElementById(
      "imageModal"
    ).style.display = "flex";

    document.getElementById(
      "modalImage"
    ).src = imageSrc;

  }

  function closeModal(){

    document.getElementById(
      "imageModal"
    ).style.display = "none";

  }

  // ========= QR =========

  new QRCode(

    document.getElementById(
      "qrcode"
    ),

    {

      text:websiteURL,

      width:180,

      height:180

    }

  );

  // ========= INICIAR =========

  loadProducts();

</script>

</body>
</html>
